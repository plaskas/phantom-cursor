<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phantom Cursor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 280px; background: #0a0a0f; color: #e0dff5;
    font-family: 'Space Mono', monospace; font-size: 11px; padding: 16px;
  }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    padding-bottom: 12px; border-bottom: 1px solid #1e1e2e; }
  .title { font-size: 13px; font-weight: 700; color: #7C6FFF; letter-spacing: -0.02em; }
  .subtitle { color: #5a5a7a; font-size: 9px; margin-top: 1px; }
  .status-row { display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid #1e1e2e; }
  .status-label { color: #5a5a7a; }
  .status-value { color: #7C6FFF; font-weight: 700; }
  .status-value.active { color: #6FFFB0; }
  .agents-section { margin-top: 12px; }
  .section-title { color: #5a5a7a; font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 8px; }
  .agent-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .agent-name { flex: 1; }
  .agent-status { color: #5a5a7a; font-size: 9px; }
  .btn { width: 100%; margin-top: 14px; padding: 8px; background: #1e1e2e;
    border: 1px solid #2e2e4e; color: #7C6FFF; font-family: 'Space Mono', monospace;
    font-size: 10px; cursor: pointer; border-radius: 4px; letter-spacing: 0.05em; }
  .btn:hover { background: #2e2e4e; }
  .test-output { margin-top: 10px; padding: 8px; background: #0f0f1a;
    border: 1px solid #1e1e2e; border-radius: 4px; color: #6FFFB0; font-size: 9px;
    line-height: 1.6; max-height: 120px; overflow-y: auto; display: none; }
  .version { color: #2e2e4e; font-size: 8px; margin-top: 12px; text-align: right; }
</style>
</head>
<body>
<div class="header">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <rect width="28" height="28" rx="6" fill="#1e1e2e"/>
    <ellipse cx="14" cy="14" rx="9" ry="5.5" stroke="#7C6FFF" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="3" fill="#7C6FFF"/>
    <circle cx="14" cy="14" r="1.2" fill="white" opacity="0.9"/>
  </svg>
  <div>
    <div class="title">Phantom Cursor</div>
    <div class="subtitle">Claude Agent Vision Layer</div>
  </div>
</div>
<div class="status-row">
  <span class="status-label">MCP Bridge</span>
  <span class="status-value active" id="bridge-status">ready</span>
</div>
<div class="status-row">
  <span class="status-label">Active Agents</span>
  <span class="status-value" id="agent-count">0</span>
</div>
<div class="status-row">
  <span class="status-label">Current Tab</span>
  <span class="status-value" id="tab-title" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</span>
</div>
<div class="agents-section">
  <div class="section-title">Agents</div>
  <div id="agents-list"><span style="color:#5a5a7a">No agents active</span></div>
</div>
<button class="btn" id="test-btn">▶ TEST SNAPSHOT</button>
<div class="test-output" id="test-output"></div>
<div class="version" id="version-el">v0.1.0</div>
<script>
const AGENT_COLORS = ['#7C6FFF','#FF6F91','#6FFFB0','#FFD16F'];
async function dispatch(cmd) { return chrome.runtime.sendMessage({ type: 'dispatch', cmd }); }
async function refresh() {
  const tabInfo = await dispatch({ type: 'tab_info' });
  if (tabInfo?.ok) document.getElementById('tab-title').textContent = tabInfo.title || tabInfo.url;
  const agentsRes = await dispatch({ type: 'list_agents' });
  const agents = agentsRes?.agents || [];
  document.getElementById('agent-count').textContent = agents.length;
  const list = document.getElementById('agents-list');
  list.innerHTML = agents.length === 0
    ? '<span style="color:#5a5a7a">No agents active</span>'
    : agents.map((id, i) => `<div class="agent-row">
        <div class="agent-dot" style="background:${AGENT_COLORS[i % 4]}"></div>
        <span class="agent-name">${id}</span>
        <span class="agent-status">active</span>
      </div>`).join('');
  const ver = await chrome.runtime.sendMessage({ type: 'version' });
  if (ver?.version) document.getElementById('version-el').textContent = `v${ver.version}`;
}
document.getElementById('test-btn').addEventListener('click', async () => {
  const out = document.getElementById('test-output');
  out.style.display = 'block'; out.textContent = 'Snapshotting…';
  const res = await dispatch({ type: 'snapshot' });
  if (res?.ok) {
    const snap = res.snapshot;
    out.textContent = `✓ ${snap.elements.length} interactive elements\n` +
      snap.elements.slice(0, 8).map(e => `${e.ref} [${e.tag}] "${e.label?.slice(0,30)}"`).join('\n') +
      (snap.elements.length > 8 ? `\n…+${snap.elements.length - 8} more` : '');
  } else { out.textContent = `✗ ${res?.error || 'snapshot failed'}`; }
});
refresh();
</script>
</body>
</html>
